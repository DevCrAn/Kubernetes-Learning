# Template: cleaner Deployment
# This file is copied to /opt/course/16/cleaner.yaml during setup
# Q16: Student must add a sidecar container to this Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cleaner
  namespace: mercury
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cleaner
  template:
    metadata:
      labels:
        app: cleaner
    spec:
      volumes:
      - name: logs
        emptyDir: {}
      containers:
      - name: cleaner-con
        image: busybox:1.31.0
        command: ['sh', '-c', 'while true; do echo "$(date) cleaner running..." >> /var/log/cleaner/cleaner.log; echo "$(date) ERROR - MISSING DATA incident!" >> /var/log/cleaner/cleaner.log; sleep 5; done']
        volumeMounts:
        - name: logs
          mountPath: /var/log/cleaner

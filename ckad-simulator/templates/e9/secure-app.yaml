apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: ckad-security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80

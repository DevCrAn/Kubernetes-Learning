apiVersion: v1
kind: Pod
metadata:
  name: logger
  namespace: ckad-logs
spec:
  containers:
    - name: logger
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          i=0
          while true; do
            echo "$(date) - Log entry $i - Application running normally"
            i=$((i+1))
            sleep 2
          done

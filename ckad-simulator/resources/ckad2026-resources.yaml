# --- Q1: Secrets ---
# Deployment with hardcoded env vars (student must replace with Secret)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-server
  namespace: ckad-secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-server
  template:
    metadata:
      labels:
        app: api-server
    spec:
      containers:
        - name: api
          image: nginx:1.25
          ports:
            - containerPort: 80
          env:
            - name: DB_USER
              value: "admin"
            - name: DB_PASS
              value: "S3cretP@ss!"

# --- Q3: RBAC ---
# Pod that loops trying to list pods (will fail with default SA)
---
apiVersion: v1
kind: Pod
metadata:
  name: log-collector
  namespace: ckad-rbac
spec:
  containers:
    - name: collector
      image: bitnami/kubectl:latest
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            kubectl get pods -n ckad-rbac 2>&1
            sleep 30
          done

# --- Q4: Canary Deployment ---
# Stable deployment (80% traffic)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp-stable
  namespace: ckad-canary
spec:
  replicas: 4
  selector:
    matchLabels:
      app: webapp
      version: v1
  template:
    metadata:
      labels:
        app: webapp
        version: v1
    spec:
      containers:
        - name: web
          image: nginx:1.24
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: webapp-svc
  namespace: ckad-canary
spec:
  selector:
    app: webapp
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP


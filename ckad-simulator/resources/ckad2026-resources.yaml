# ============================================================================
# Q19: Fix Broken Pod with Correct ServiceAccount
# (Source: aravind4799 Q04, vloidcloudtech Q04)
# ============================================================================

# ServiceAccounts
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitor-sa
  namespace: ckad-sa-fix
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wrong-sa
  namespace: ckad-sa-fix
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-sa
  namespace: ckad-sa-fix

# Roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: metrics-reader
  namespace: ckad-sa-fix
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: full-access
  namespace: ckad-sa-fix
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: view-only
  namespace: ckad-sa-fix
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get"]

# RoleBindings - monitor-sa is bound to metrics-reader (the correct one)
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitor-binding
  namespace: ckad-sa-fix
subjects:
  - kind: ServiceAccount
    name: monitor-sa
    namespace: ckad-sa-fix
roleRef:
  kind: Role
  name: metrics-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: admin-binding
  namespace: ckad-sa-fix
subjects:
  - kind: ServiceAccount
    name: admin-sa
    namespace: ckad-sa-fix
roleRef:
  kind: Role
  name: full-access
  apiGroup: rbac.authorization.k8s.io

# Pod using wrong-sa (student must fix to use monitor-sa)
---
apiVersion: v1
kind: Pod
metadata:
  name: metrics-pod
  namespace: ckad-sa-fix
spec:
  serviceAccountName: wrong-sa
  containers:
    - name: metrics
      image: curlimages/curl:latest
      command: ["sh", "-c"]
      args:
        - |
          while true; do
            echo "Attempting to read metrics..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $(cat /var/run/secrets/kubernetes.io/serviceaccount/token)" \
              --cacert /var/run/secrets/kubernetes.io/serviceaccount/ca.crt \
              "https://kubernetes.default.svc/api/v1/namespaces/ckad-sa-fix/pods" 2>&1)
            if [ "$RESPONSE" != "200" ]; then
              echo "ERROR: Authorization failed - cannot list pods with current ServiceAccount"
            else
              echo "Successfully retrieved metrics"
            fi
            sleep 10
          done


# ============================================================================
# Q22: Resource Requests/Limits from Namespace Max (LimitRange)
# (Source: Reddit - "kubectl describe namespace dev to get the MAX")
# ============================================================================
---
apiVersion: v1
kind: LimitRange
metadata:
  name: resource-limits
  namespace: ckad-resources
spec:
  limits:
    - type: Container
      max:
        cpu: "1"
        memory: "1Gi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"


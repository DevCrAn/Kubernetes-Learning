# --- Q14: Logs + Metrics ---
# Extra pods to create CPU load for metrics question
---
apiVersion: v1
kind: Pod
metadata:
  name: cpu-high
  namespace: ckad-logs
spec:
  containers:
    - name: stress
      image: busybox:1.36
      command: ["/bin/sh", "-c"]
      args:
        - |
          while true; do
            dd if=/dev/zero of=/dev/null bs=1M count=100 2>/dev/null
          done
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
---
apiVersion: v1
kind: Pod
metadata:
  name: cpu-low
  namespace: ckad-logs
spec:
  containers:
    - name: idle
      image: busybox:1.36
      command: ["/bin/sh", "-c", "while true; do sleep 60; done"]
      resources:
        requests:
          cpu: "10m"
          memory: "32Mi"
        limits:
          cpu: "50m"
          memory: "64Mi"


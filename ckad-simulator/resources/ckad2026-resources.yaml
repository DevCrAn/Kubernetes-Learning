# ============================================================================
# Q25: Fix Deployment Exceeding ResourceQuota
# (Source: TiPunchLabs Oni Q6, Reddit)
# ============================================================================
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: ckad-quota-fix
spec:
  hard:
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "1"
    limits.memory: "1Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quota-app
  namespace: ckad-quota-fix
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quota-app
  template:
    metadata:
      labels:
        app: quota-app
    spec:
      containers:
        - name: app
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "400m"
              memory: "400Mi"
            limits:
              cpu: "800m"
              memory: "800Mi"

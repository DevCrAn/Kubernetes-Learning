# Venus namespace resources for CKAD Simulator
# Question 20: NetworkPolicy - api and frontend Deployments with Services

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: venus
  labels:
    id: api
spec:
  replicas: 2
  selector:
    matchLabels:
      id: api
  template:
    metadata:
      labels:
        id: api
    spec:
      containers:
      - name: api
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: venus
spec:
  selector:
    id: api
  ports:
  - port: 2222
    targetPort: 80
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: venus
  labels:
    id: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      id: frontend
  template:
    metadata:
      labels:
        id: frontend
    spec:
      containers:
      - name: frontend
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: venus
spec:
  selector:
    id: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP

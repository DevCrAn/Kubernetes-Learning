# Sun namespace resources para el simulador CKAD
# Question 16, 17, 18: varios pods

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0023
  namespace: sun
  labels:
    app: sun-app
spec:
  containers:
  - name: nginx
    image: nginx:1.19-alpine
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0024
  namespace: sun
  labels:
    app: sun-app
spec:
  containers:
  - name: nginx
    image: nginx:1.19-alpine
    ports:
    - containerPort: 80

---
# Question 18: Deployment con ServiceAccount específico
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sun-deploy
  namespace: sun
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sun-deploy
  template:
    metadata:
      labels:
        app: sun-deploy
    spec:
      serviceAccountName: sa-sun-deploy
      containers:
      - name: nginx
        image: nginx:1.19-alpine
        ports:
        - containerPort: 80

# Sun namespace resources for CKAD Simulator
# Question 22: Pods with type: worker/runner labels for labeling exercise
# Preview Q2: Deployment and ServiceAccount

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0023
  namespace: sun
  labels:
    app: sun-app
    type: worker
spec:
  containers:
  - name: nginx
    image: nginx:1.17.3-alpine
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0024
  namespace: sun
  labels:
    app: sun-app
    type: runner
spec:
  containers:
  - name: nginx
    image: nginx:1.17.3-alpine
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0025
  namespace: sun
  labels:
    app: sun-app
    type: other
spec:
  containers:
  - name: nginx
    image: nginx:1.17.3-alpine
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0026
  namespace: sun
  labels:
    app: sun-app
    type: worker
spec:
  containers:
  - name: httpd
    image: httpd:2.4.41-alpine
    ports:
    - containerPort: 80

---
apiVersion: v1
kind: Pod
metadata:
  name: sun-pod-0027
  namespace: sun
  labels:
    app: sun-app
    type: runner
spec:
  containers:
  - name: httpd
    image: httpd:2.4.41-alpine
    ports:
    - containerPort: 80

---
# Preview Q2: Deployment with ServiceAccount (used by sa-sun-deploy)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sun-deploy
  namespace: sun
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sun-deploy
  template:
    metadata:
      labels:
        app: sun-deploy
    spec:
      serviceAccountName: sa-sun-deploy
      containers:
      - name: nginx
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80

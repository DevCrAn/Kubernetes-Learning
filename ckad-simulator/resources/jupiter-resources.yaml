# Jupiter namespace resources para el simulador CKAD
# Question 19: Jobs y CronJobs

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: jupiter-config
  namespace: jupiter
data:
  config.txt: |
    jupiter-config-data

---
apiVersion: v1
kind: Pod
metadata:
  name: jupiter-pod-1
  namespace: jupiter
  labels:
    app: jupiter-app
spec:
  containers:
  - name: nginx
    image: nginx:1.19-alpine
    ports:
    - containerPort: 80

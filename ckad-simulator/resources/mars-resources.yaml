# Mars namespace resources for CKAD Simulator
# Question 18: Service misconfiguration - manager-api-svc with WRONG selector

---
# Q18: Deployment manager-api-deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manager-api-deployment
  namespace: mars
spec:
  replicas: 1
  selector:
    matchLabels:
      app: manager-api
  template:
    metadata:
      labels:
        app: manager-api
    spec:
      containers:
      - name: manager-api
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80

---
# Q18: Service with INTENTIONALLY WRONG selector (manager-api-WRONG instead of manager-api)
apiVersion: v1
kind: Service
metadata:
  name: manager-api-svc
  namespace: mars
spec:
  selector:
    app: manager-api-WRONG
  ports:
  - port: 4444
    targetPort: 80
  type: ClusterIP

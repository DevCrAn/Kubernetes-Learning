# Neptune namespace resources for CKAD Simulator
# Question 8: api-new-c32 Deployment - rollout history handled in setup-ckad-env.sh

---
# Initial deployment - setup script will create rollout history with a bad revision
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-new-c32
  namespace: neptune
  annotations:
    kubernetes.io/change-cause: "initial setup"
spec:
  replicas: 3
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: api-new-c32
  template:
    metadata:
      labels:
        app: api-new-c32
    spec:
      containers:
      - name: api
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80

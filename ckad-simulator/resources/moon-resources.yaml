# Moon namespace resources for CKAD Simulator
# Question 13: StorageClass and PVC
# Question 14: secret-handler Pod
# Question 15: web-moon Deployment with ConfigMap volume

---
# Q14: secret-handler Pod - student needs to add env vars and volume mount
apiVersion: v1
kind: Pod
metadata:
  name: secret-handler
  namespace: moon
spec:
  containers:
  - name: secret-handler
    image: nginx:1.17.3-alpine
    ports:
    - containerPort: 80

---
# Q15: web-moon Deployment - already configured for ConfigMap volume
# The ConfigMap does NOT exist yet - student must create it
# Pods will be in Pending/Error state until ConfigMap is created
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-moon
  namespace: moon
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-moon
  template:
    metadata:
      labels:
        app: web-moon
    spec:
      volumes:
      - name: html-volume
        configMap:
          name: configmap-web-moon-html
      containers:
      - name: nginx
        image: nginx:1.17.3-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: html-volume
          mountPath: /usr/share/nginx/html
